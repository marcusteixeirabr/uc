{{template "base" .}}
{{define "title"}}Nova Comunicacao{{end}}
{{define "content"}}
<h1>Nova Comunicação</h1>
<form method="POST" action="/comunicacoes/nova">
    <label>Título:<br>
        <input type="text" name="titulo" required style="width:100%">
    </label><br><br>

          <label>Descrição:<br>
          <textarea name="descricao" rows="4" required style="width:100%"></textarea>
      </label><br><br>

      <label>Seu e-mail:<br>
          <input type="email" name="email" required style="width:100%">
      </label><br><br>

      <label>Unidade de Conservação:<br>
          <select name="unidade_id" required style="width:100%">
              <option value="">-- selecione --</option>
          </select>
      </label><br><br>

      <button type="submit">Enviar</button>
  </form>
  {{end}}
